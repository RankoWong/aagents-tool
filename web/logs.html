<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m4b-tool 日志查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #4ec9b0;
            margin-bottom: 10px;
        }

        .controls {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-primary {
            background: #0e639c;
            color: white;
        }

        .btn-primary:hover {
            background: #1177bb;
        }

        .btn-secondary {
            background: #3c3c3c;
            color: #d4d4d4;
        }

        .btn-secondary:hover {
            background: #4c4c4c;
        }

        select, input {
            padding: 8px 12px;
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
            margin-right: 10px;
        }

        .log-container {
            background: #1e1e1e;
            border: 1px solid #454545;
            border-radius: 8px;
            overflow: hidden;
        }

        .log-content {
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 600px;
            overflow-y: auto;
            background: #1e1e1e;
        }

        .log-line {
            padding: 2px 0;
            border-bottom: 1px solid #2d2d2d;
        }

        .log-line:hover {
            background: #2d2d2d;
        }

        /* 日志级别颜色 */
        .log-ERROR {
            color: #f48771;
            background: rgba(244, 135, 113, 0.1);
        }

        .log-WARNING {
            color: #cca700;
            background: rgba(204, 167, 0, 0.1);
        }

        .log-SUCCESS {
            color: #89d185;
            background: rgba(137, 209, 133, 0.1);
        }

        .log-INFO {
            color: #d4d4d4;
        }

        .timestamp {
            color: #858585;
            margin-right: 10px;
        }

        .level {
            font-weight: bold;
            margin-right: 10px;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .level-ERROR {
            background: #f48771;
            color: #1e1e1e;
        }

        .level-WARNING {
            background: #cca700;
            color: #1e1e1e;
        }

        .level-SUCCESS {
            background: #89d185;
            color: #1e1e1e;
        }

        .level-INFO {
            background: #4fc1ff;
            color: #1e1e1e;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #252526;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4ec9b0;
        }

        .stat-label {
            color: #858585;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #d4d4d4;
            font-size: 24px;
            font-weight: bold;
        }

        .filter-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #454545;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #858585;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #858585;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .auto-refresh input[type="checkbox"] {
            margin: 0;
        }

        .highlight {
            background: #264f78;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 m4b-tool 日志查看器</h1>
            <p>实时查看API调用日志和错误信息</p>
        </div>

        <div class="stats" id="stats"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="loadLogs()">🔄 刷新日志</button>
            <button class="btn btn-secondary" onclick="clearLogs()">🗑️ 清空日志</button>
            <button class="btn btn-secondary" onclick="downloadLogs()">💾 下载日志</button>

            <div class="filter-section">
                <label>
                    显示行数：
                    <select id="lines" onchange="loadLogs()">
                        <option value="50">最后 50 行</option>
                        <option value="100" selected>最后 100 行</option>
                        <option value="200">最后 200 行</option>
                        <option value="500">最后 500 行</option>
                        <option value="0">全部</option>
                    </select>
                </label>

                <label>
                    级别过滤：
                    <select id="level" onchange="filterLogs()">
                        <option value="">全部</option>
                        <option value="ERROR">只看错误</option>
                        <option value="WARNING">只看警告</option>
                        <option value="SUCCESS">只看成功</option>
                        <option value="INFO">只看信息</option>
                    </select>
                </label>

                <label>
                    <input type="text" id="search" placeholder="搜索日志内容..." oninput="filterLogs()">
                </label>

                <div class="auto-refresh">
                    <input type="checkbox" id="autoRefresh">
                    <label for="autoRefresh">自动刷新 (3秒)</label>
                </div>
            </div>
        </div>

        <div class="log-container">
            <div class="log-content" id="logContent">
                <div class="loading">正在加载日志...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'api.php';
        let rawLogs = '';
        let refreshInterval = null;

        // 加载日志
        function loadLogs() {
            const lines = document.getElementById('lines').value;

            fetch(`${API_BASE}?action=view_logs&lines=${lines}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        rawLogs = data.logs;
                        renderLogs(data.logs);
                        updateStats(data.logs);
                    } else {
                        showError('加载日志失败');
                    }
                })
                .catch(err => {
                    console.error(err);
                    showError('加载日志失败: ' + err.message);
                });
        }

        // 渲染日志
        function renderLogs(logs) {
            const logContent = document.getElementById('logContent');

            if (!logs || logs.trim() === '') {
                logContent.innerHTML = '<div class="empty">暂无日志</div>';
                return;
            }

            const lines = logs.split('\n').filter(line => line.trim() !== '');
            const html = lines.map(line => formatLogLine(line)).join('');

            logContent.innerHTML = html || '<div class="empty">暂无日志</div>';
        }

        // 格式化日志行
        function formatLogLine(line) {
            // 解析日志格式: [timestamp] [level] message
            const match = line.match(/\[(.*?)\] \[(.*?)\] (.*)/);

            if (!match) {
                return `<div class="log-line">${escapeHtml(line)}</div>`;
            }

            const [, timestamp, level, message] = match;

            return `
                <div class="log-line log-${level}">
                    <span class="timestamp">${escapeHtml(timestamp)}</span>
                    <span class="level level-${level}">${escapeHtml(level)}</span>
                    <span class="message">${escapeHtml(message)}</span>
                </div>
            `;
        }

        // 过滤日志
        function filterLogs() {
            const level = document.getElementById('level').value;
            const search = document.getElementById('search').value.toLowerCase();

            const lines = rawLogs.split('\n').filter(line => line.trim() !== '');
            const filtered = lines.filter(line => {
                const match = line.match(/\[(.*?)\] \[(.*?)\] (.*)/);
                if (!match) return true;

                const lineLevel = match[2];
                const message = match[3];

                const levelMatch = !level || lineLevel === level;
                const searchMatch = !search || message.toLowerCase().includes(search);

                return levelMatch && searchMatch;
            });

            renderLogs(filtered.join('\n'));
        }

        // 更新统计
        function updateStats(logs) {
            const lines = logs.split('\n').filter(line => line.trim() !== '');
            const stats = {
                total: lines.length,
                errors: 0,
                warnings: 0,
                success: 0
            };

            lines.forEach(line => {
                if (line.includes('[ERROR]')) stats.errors++;
                if (line.includes('[WARNING]')) stats.warnings++;
                if (line.includes('[SUCCESS]')) stats.success++;
            });

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">总行数</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card" style="border-left-color: #f48771;">
                    <div class="stat-label">错误</div>
                    <div class="stat-value">${stats.errors}</div>
                </div>
                <div class="stat-card" style="border-left-color: #cca700;">
                    <div class="stat-label">警告</div>
                    <div class="stat-value">${stats.warnings}</div>
                </div>
                <div class="stat-card" style="border-left-color: #89d185;">
                    <div class="stat-label">成功</div>
                    <div class="stat-value">${stats.success}</div>
                </div>
            `;
        }

        // 清空日志
        function clearLogs() {
            if (confirm('确定要清空今天的日志吗？')) {
                fetch(`${API_BASE}?action=clear_logs`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            loadLogs();
                            alert('日志已清空');
                        }
                    });
            }
        }

        // 下载日志
        function downloadLogs() {
            const blob = new Blob([rawLogs], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `m4b-tool-logs-${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 显示错误
        function showError(message) {
            document.getElementById('logContent').innerHTML = `
                <div class="empty" style="color: #f48771;">
                    ❌ ${message}
                </div>
            `;
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 自动刷新
        document.getElementById('autoRefresh').addEventListener('change', function() {
            if (this.checked) {
                refreshInterval = setInterval(loadLogs, 3000);
            } else {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        });

        // 初始加载
        loadLogs();

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
